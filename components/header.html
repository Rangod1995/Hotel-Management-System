<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Component</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fa;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .header {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e9edf2;
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .header-left h2 {
            font-weight: 600;
            font-size: 20px;
            color: #0f172a;
        }

        .header-left i {
            font-size: 20px;
            color: #475569;
            cursor: pointer;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .header-right .notification {
            position: relative;
            cursor: pointer;
        }

        .header-right .notification .badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 30px;
        }

        .header-avatar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-avatar img {
            width: 38px;
            height: 38px;
            border-radius: 40px;
            background: #2563eb;
            object-fit: cover;
        }

        .header-avatar .name {
            font-weight: 500;
            font-size: 14px;
            color: #0f172a;
        }

        #menuToggle {
            display: none;
        }

        /* Page content placeholder */
        .page-content {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-content h1 {
            color: #0f172a;
            font-weight: 600;
        }

        .page-content p {
            color: #64748b;
            margin-top: 10px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            #menuToggle {
                display: block !important;
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 12px 16px;
            }
            .header-avatar .name {
                display: none;
            }
            .header-left h2 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-left">
            <i class="fas fa-bars" id="menuToggle"></i>
            <h2>Revenue Overview</h2>
        </div>
        <div class="header-right">
            <div class="notification">
                <i class="fas fa-bell" style="font-size: 20px; color:#1e293b;"></i>
                <span class="badge">3</span>
            </div>
            <div class="header-avatar">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=2563eb&color=fff&size=38" alt="avatar">
                <span class="name">Admin</span>
            </div>
        </div>
    </header>

    <!-- Page Content Placeholder -->
    <div class="page-content">
        <h1>Header Component</h1>
        <p>This is the header component. Copy this code to use it in your project.</p>
    </div>

    <script>
        // Mobile menu toggle functionality
        document.getElementById('menuToggle').addEventListener('click', function() {
            alert('Sidebar toggle would work here when integrated with sidebar component');
        });
    </script>
</body>
</html>
