<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer Component</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: auto;
            padding: 20px 32px;
            border-top: 1px solid #e9edf2;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #64748b;
            background: white;
        }

        .footer a {
            color: #2563eb;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #1d4ed8;
            text-decoration: underline;
        }

        .footer span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Page content placeholder */
        .page-content {
            flex: 1;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .page-content h1 {
            color: #0f172a;
            font-weight: 600;
        }

        .page-content p {
            color: #64748b;
            margin-top: 10px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .footer {
                flex-direction: column;
                align-items: center;
                gap: 8px;
                text-align: center;
                padding: 16px 20px;
            }
            
            .footer span {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Page Content Placeholder -->
    <div class="page-content">
        <h1>Footer Component</h1>
        <p>This is the footer component. Copy this code to use it in your project.</p>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <span>© 2026 HotelManager. All rights reserved.</span>
        <span>
            <a href="#">Privacy</a>
            <span>·</span>
            <a href="#">Terms</a>
            <span>·</span>
            <a href="#">Support</a>
        </span>
    </footer>
</body>
</html>
