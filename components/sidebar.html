<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Component</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fa;
            min-height: 100vh;
            display: flex;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: #1e293b;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            transition: transform 0.2s;
            z-index: 100;
            padding: 24px 16px;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 32px;
            border-bottom: 1px solid #334155;
            margin-bottom: 24px;
        }

        .sidebar-brand i {
            font-size: 28px;
            color: #38bdf8;
        }

        .sidebar-brand span {
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.3px;
        }

        .sidebar-brand span small {
            font-weight: 400;
            color: #94a3b8;
            font-size: 14px;
        }

        .sidebar-menu {
            list-style: none;
            flex: 1;
        }

        .sidebar-menu li {
            margin-bottom: 6px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: 0.15s;
        }

        .sidebar-menu a i {
            width: 22px;
            font-size: 18px;
            text-align: center;
        }

        .sidebar-menu a:hover,
        .sidebar-menu .active a {
            background: #334155;
            color: white;
        }

        .sidebar-menu .active a {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 8px rgba(37, 99, 235, 0.3);
        }

        .sidebar-footer {
            border-top: 1px solid #334155;
            padding-top: 20px;
            margin-top: 8px;
        }

        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
        }

        .sidebar-footer a:hover {
            background: #334155;
            color: white;
        }

        /* Main content placeholder */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            flex: 1;
        }

        .main-content h1 {
            color: #0f172a;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                transform: translateX(-100%);
                width: 250px;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-hotel"></i>
            <span>Hotel<span style="color:#94a3b8; font-weight:400;">Manager</span></span>
        </div>
        <ul class="sidebar-menu">
            <li class="active"><a href="#"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="#"><i class="fas fa-bed"></i> Rooms</a></li>
            <li><a href="#"><i class="fas fa-calendar-check"></i> Bookings</a></li>
            <li><a href="#"><i class="fas fa-users"></i> Guests</a></li>
            <li><a href="#"><i class="fas fa-dollar-sign"></i> Revenue</a></li>
            <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="#"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>

    <!-- Main Content Placeholder -->
    <div class="main-content">
        <h1>Sidebar Component</h1>
        <p style="color: #64748b; margin-top: 10px;">This is the sidebar component. Copy this code to use it in your project.</p>
    </div>

    <script>
        // Mobile toggle functionality
        console.log('Sidebar loaded successfully');
    </script>
</body>
</html>
