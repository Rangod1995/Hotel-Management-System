<!-- bookings.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings - Hotel Management System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/bookings.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body class="dashboard-page">
    <div class="dashboard-shell">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-hotel"></i>
            <span>HotelManager</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="rooms.html">
                <i class="fas fa-bed"></i>
                <span>Rooms</span>
            </a>
            <a href="bookings.html" class="active">
                <i class="fas fa-calendar-check"></i>
                <span>Bookings</span>
            </a>
            <a href="guests.html">
                <i class="fas fa-users"></i>
                <span>Guests</span>
            </a>
            <a href="calendar.html">
                <i class="fas fa-calendar-alt"></i>
                <span>Calendar</span>
            </a>
            <a href="reports.html">
                <i class="fas fa-chart-bar"></i>
                <span>Reports</span>
            </a>
            <a href="settings.html">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header class="top-header">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-search">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search bookings...">
            </div>
            <div class="header-actions">
                <button class="notification-btn">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge">3</span>
                </button>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=4F46E5&color=fff" alt="User">
                    <span>Admin</span>
                </div>
            </div>
        </header>

        <!-- Bookings Content -->
        <div class="page-content">
            <div class="page-header">
                <div>
                    <h1>Bookings</h1>
                    <p>Manage all reservations and check-ins</p>
                </div>
                <button class="btn-primary" id="addBookingBtn">
                    <i class="fas fa-plus"></i> New Booking
                </button>
            </div>

            <!-- Booking Tabs -->
            <div class="booking-tabs">
                <button class="tab-btn active" data-tab="all">All</button>
                <button class="tab-btn" data-tab="confirmed">Confirmed</button>
                <button class="tab-btn" data-tab="pending">Pending</button>
                <button class="tab-btn" data-tab="checked-in">Checked In</button>
                <button class="tab-btn" data-tab="cancelled">Cancelled</button>
            </div>

            <!-- Bookings Table -->
            <div class="table-container">
                <table class="booking-table">
                    <thead>
                        <tr>
                            <th>Booking ID</th>
                            <th>Guest</th>
                            <th>Room</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                            <th>Status</th>
                            <th>Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody">
                        <!-- Bookings will be dynamically loaded -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Booking Modal -->
    <div class="modal" id="bookingModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>New Booking</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="bookingForm">
                <div class="form-group">
                    <label>Guest Name</label>
                    <input type="text" class="form-input" placeholder="Full name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-input" placeholder="Email address" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" class="form-input" placeholder="Phone number" required>
                </div>
                <div class="form-group">
                    <label>Room</label>
                    <select class="form-input" required>
                        <option value="">Select Room</option>
                        <option>101 - Standard</option>
                        <option>102 - Standard</option>
                        <option>201 - Deluxe</option>
                        <option>202 - Deluxe</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Check In</label>
                        <input type="date" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Check Out</label>
                        <input type="date" class="form-input" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Number of Guests</label>
                    <input type="number" class="form-input" value="1" min="1" max="4">
                </div>
                <button type="submit" class="btn-primary" style="width:100%;">
                    <i class="fas fa-save"></i> Create Booking
                </button>
            </form>
        </div>
    </div>

    </div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/bookings.js"></script>
</body>
</html>
