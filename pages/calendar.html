<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Hotel Management System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/calendar.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body class="dashboard-page">
    <div class="dashboard-shell">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-hotel"></i>
            <span>HotelManager</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="rooms.html">
                <i class="fas fa-bed"></i>
                <span>Rooms</span>
            </a>
            <a href="bookings.html">
                <i class="fas fa-calendar-check"></i>
                <span>Bookings</span>
            </a>
            <a href="guests.html">
                <i class="fas fa-users"></i>
                <span>Guests</span>
            </a>
            <a href="calendar.html" class="active">
                <i class="fas fa-calendar-alt"></i>
                <span>Calendar</span>
            </a>
            <a href="reports.html">
                <i class="fas fa-chart-bar"></i>
                <span>Reports</span>
            </a>
            <a href="settings.html">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header class="top-header">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-search">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search...">
            </div>
            <div class="header-actions">
                <button class="notification-btn">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge">3</span>
                </button>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=4F46E5&color=fff" alt="User">
                    <span>Admin</span>
                </div>
            </div>
        </header>

        <!-- Calendar Content -->
        <div class="page-content">
            <div class="page-header">
                <div>
                    <h1>Booking Calendar</h1>
                    <p>View and manage reservations by date</p>
                </div>
                <div class="calendar-actions">
                    <button class="btn-secondary" id="todayBtn">Today</button>
                    <button class="btn-secondary" id="prevBtn">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <h2 id="currentMonthYear">January 2026</h2>
                    <button class="btn-secondary" id="nextBtn">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>

            <!-- Calendar Grid -->
            <div class="calendar-container">
                <div class="calendar-weekdays">
                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- Calendar will be dynamically generated -->
                </div>
            </div>
        </div>
    </div>

    </div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/calendar.js"></script>
</body>
</html>
